name: Update WordPress.org readme/assets

on:
  push:
    branches:
      - main
    paths:
      - readme.txt
      - .wordpress-org/**
  workflow_dispatch:

jobs:
  update:
    name: Readme and assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

      - name: WordPress.org readme/assets update
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: fenton-digital-badges
          # Only sync readme.txt and .wordpress-org; main may contain unreleased code.
          IGNORE_OTHER_FILES: true
