<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500" role="img" aria-label="Fenton Digital Badges">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8fffa"/>
      <stop offset="45%" stop-color="#f4fffc"/>
      <stop offset="100%" stop-color="#dffaf3"/>
    </linearGradient>
    <linearGradient id="ring" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%" stop-color="#f6f6f6"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="70%" stop-color="#c2c2c2"/>
      <stop offset="100%" stop-color="#8a8a8a"/>
    </linearGradient>
    <linearGradient id="ring-edge" x1="25%" y1="10%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#c4c4c4"/>
      <stop offset="50%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#50e3c1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#50e3c1" stop-opacity="0.35"/>
    </linearGradient>

    <path
      id="checked-tile"
      fill-rule="evenodd"
      d="M0,-4.5 L4.5,0 L0,4.5 L-4.5,0 Z
         M-2.15,0.05 L-0.55,1.75 L2.45,-1.85 L1.75,-2.45 L-0.55,0.55 L-1.7,-0.55 Z"
    />

    <g id="mark">
      <use href="#checked-tile" transform="translate(-10,-20)"/>
      <use href="#checked-tile" transform="translate(0,-20)"/>
      <use href="#checked-tile" transform="translate(10,-20)"/>
      <use href="#checked-tile" transform="translate(-10,-10)"/>
      <use href="#checked-tile" transform="translate(-10,0)"/>
      <use href="#checked-tile" transform="translate(0,0)"/>
      <use href="#checked-tile" transform="translate(10,0)"/>
      <use href="#checked-tile" transform="translate(-10,10)"/>
      <use href="#checked-tile" transform="translate(-10,20)"/>
    </g>

    <!-- Badge body without the white icon canvas -->
    <g id="badge">
      <path d="M0 0 L112 0 A112 112 0 1 1 0 112 Z" fill="#50e3c1"/>
      <g transform="translate(29,22) scale(0.7)" fill="#ffffff">
        <use href="#mark"/>
      </g>
      <circle cx="112" cy="112" r="99" fill="url(#ring-edge)"/>
      <circle cx="112" cy="112" r="97" fill="url(#ring)"/>
      <circle cx="112" cy="112" r="84" fill="#ffffff"/>
      <g transform="translate(112,64) scale(1.05)" fill="#50e3c1">
        <use href="#mark"/>
      </g>
      <text
        x="112" y="125"
        text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#4a4a4a"
        letter-spacing="2"
      >FENTON</text>
      <text
        x="112" y="141"
        text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="17"
        font-weight="700"
        fill="#50e3c1"
      >Digital Badges</text>
    </g>
  </defs>

  <rect width="1544" height="500" fill="url(#bg)"/>

  <!-- Soft wave band -->
  <path d="M0 390 C220 360 380 420 560 395 C780 365 960 430 1180 400 C1320 382 1440 410 1544 395 L1544 500 L0 500 Z" fill="url(#wave)"/>
  <path d="M0 440 C180 420 340 455 520 438 C740 416 920 468 1140 445 C1300 428 1420 458 1544 442 L1544 500 L0 500 Z" fill="#50e3c1" opacity="0.22"/>

  <!-- Bubbles -->
  <circle cx="1280" cy="90" r="10" fill="#50e3c1" opacity="0.2"/>
  <circle cx="1320" cy="140" r="6" fill="#50e3c1" opacity="0.28"/>
  <circle cx="1400" cy="70" r="14" fill="#50e3c1" opacity="0.15"/>
  <circle cx="1460" cy="160" r="5" fill="#50e3c1" opacity="0.25"/>
  <circle cx="70" cy="420" r="8" fill="#ffffff" opacity="0.35"/>
  <circle cx="120" cy="450" r="4" fill="#ffffff" opacity="0.4"/>

  <!-- Badge -->
  <use href="#badge" transform="translate(90,68) scale(1.6)"/>

  <!-- Copy -->
  <text
    x="520" y="230"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="64"
    font-weight="700"
    fill="#2d3748"
  >Fenton Digital Badges</text>
  <text
    x="520" y="295"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="32"
    font-weight="500"
    fill="#0f766e"
  >Issue Open Badges from your site</text>
</svg>
