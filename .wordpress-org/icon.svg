<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Fenton Digital Badges">
  <defs>
    <linearGradient id="ring" x1="20%" y1="5%" x2="80%" y2="95%">
      <stop offset="0%" stop-color="#f6f6f6"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="70%" stop-color="#c2c2c2"/>
      <stop offset="100%" stop-color="#8a8a8a"/>
    </linearGradient>
    <linearGradient id="ring-edge" x1="25%" y1="10%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#c4c4c4"/>
      <stop offset="50%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>

    <!-- One tile: diamond with checkmark cut out (shows through on both colorways) -->
    <path
      id="checked-tile"
      fill-rule="evenodd"
      d="M0,-4.5 L4.5,0 L0,4.5 L-4.5,0 Z
         M-2.15,0.05 L-0.55,1.75 L2.45,-1.85 L1.75,-2.45 L-0.55,0.55 L-1.7,-0.55 Z"
    />

    <!-- 9 checked tiles as an F -->
    <g id="mark">
      <!-- Top bar -->
      <use href="#checked-tile" transform="translate(-10,-20)"/>
      <use href="#checked-tile" transform="translate(0,-20)"/>
      <use href="#checked-tile" transform="translate(10,-20)"/>
      <!-- Stem -->
      <use href="#checked-tile" transform="translate(-10,-10)"/>
      <!-- Middle bar -->
      <use href="#checked-tile" transform="translate(-10,0)"/>
      <use href="#checked-tile" transform="translate(0,0)"/>
      <use href="#checked-tile" transform="translate(10,0)"/>
      <!-- Stem foot -->
      <use href="#checked-tile" transform="translate(-10,10)"/>
      <use href="#checked-tile" transform="translate(-10,20)"/>
    </g>
  </defs>

  <rect width="256" height="256" fill="#ffffff"/>

  <g transform="translate(16,16)">
    <!-- Sharp top-left corner + circular body -->
    <path d="M0 0 L112 0 A112 112 0 1 1 0 112 Z" fill="#50e3c1"/>

    <!-- Corner mark -->
    <g transform="translate(29,22) scale(0.7)" fill="#ffffff">
      <use href="#mark"/>
    </g>

    <!-- Metallic silver ring -->
    <circle cx="112" cy="112" r="99" fill="url(#ring-edge)"/>
    <circle cx="112" cy="112" r="97" fill="url(#ring)"/>
    <circle cx="112" cy="112" r="84" fill="#ffffff"/>

    <!-- Center mark -->
    <g transform="translate(112,64) scale(1.05)" fill="#50e3c1">
      <use href="#mark"/>
    </g>

    <text
      x="112" y="125"
      text-anchor="middle"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
      font-size="22"
      font-weight="700"
      fill="#4a4a4a"
      letter-spacing="2"
    >FENTON</text>

    <text
      x="112" y="141"
      text-anchor="middle"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
      font-size="17"
      font-weight="700"
      fill="#50e3c1"
    >Digital Badges</text>
  </g>
</svg>
